spring.security.saml2.relyingparty.registration.saml.entity-id=second-service-provider
spring.security.saml2.relyingparty.registration.saml.signing.credentials[0].certificate-location=classpath:credentials/sp-certificate.cert
spring.security.saml2.relyingparty.registration.saml.signing.credentials[0].private-key-location=classpath:credentials/sp-private.key
spring.security.saml2.relyingparty.registration.saml.assertingparty.entity-id=my-identity-provider-app
spring.security.saml2.relyingparty.registration.saml.assertingparty.singlesignon.binding=REDIRECT
spring.security.saml2.relyingparty.registration.saml.assertingparty.metadata-uri=http://localhost:8081/this-is-idp/saml/idp/metadata
#spring.security.saml2.relyingparty.registration.saml.assertingparty.metadata-uri=classpath:idp-metadata/idp1-metadata.xml

spring.security.saml2.relyingparty.registration.saml.singlelogout.binding=REDIRECT
spring.security.saml2.relyingparty.registration.saml.singlelogout.url={baseUrl}/saml/logout
spring.security.saml2.relyingparty.registration.saml.singlelogout.response-url={baseUrl}/saml/logout-response
spring.security.saml2.relyingparty.registration.saml.acs.location={baseUrl}/saml/sso

# relying party = service provider (SP)
# asserting party = identity provider (IDP)
